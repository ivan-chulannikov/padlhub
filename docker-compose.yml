services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/padlhub
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:3000/api
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  mongo-data:
